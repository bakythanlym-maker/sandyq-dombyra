<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const getBackendBaseUrl = () => {
            return 'https://nurmaaq-my-sandyq-dombyra.hf.space';
        };

        function App() {
            // UI State
            const [activeTab, setActiveTab] = useState('home');
            const [activeNav, setActiveNav] = useState('checkbox');
            const [sidebarOpen, setSidebarOpen] = useState(false);

            // Data State
            const [sequence, setSequence] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [sensitivity, setSensitivity] = useState(0.08);
            const [minDuration, setMinDuration] = useState(30);
            const [tuning, setTuning] = useState('DG');
            const [quality, setQuality] = useState('pro');
            const [audioUrl, setAudioUrl] = useState(null);
            const [currentTime, setCurrentTime] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isSynthMode, setIsSynthMode] = useState(true);
            const [playbackSpeed, setPlaybackSpeed] = useState(1.0);
            const [audioDuration, setAudioDuration] = useState(0);
            const [isRecording, setIsRecording] = useState(false);
            const [recordingTime, setRecordingTime] = useState(0);

            const audioRef = useRef(null);
            const fileRef = useRef(null);
            const timelineRef = useRef(null);
            const audioCtxRef = useRef(null);
            const sequenceRef = useRef([]);
            const lastPlayedTimeRef = useRef(-1);
            const mediaRecorderRef = useRef(null);
            const audioChunksRef = useRef([]);
            const timerRef = useRef(null);

            useEffect(() => { sequenceRef.current = sequence; }, [sequence]);

            const PIXELS_PER_SECOND = 160;
            const G_STRING_Y = 100;
            const D_STRING_Y = 220;

            const tunings = {
                'DG': { d:146.83, g:196.00, label:'D – G (Ре бұрауы)' },
                'CG': { d:130.81, g:196.00, label:'C – G (До бұрауы)' },
                'AD': { d:110.00, g:146.83, label:'A – D (Ля бұрауы)' }
            };

            const playSynth = (frequency) => {
                if (!audioCtxRef.current) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtxRef.current = new AudioContext();
                }
                const ctx = audioCtxRef.current;
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(frequency, ctx.currentTime);
                gainNode.gain.setValueAtTime(0, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(1, ctx.currentTime + 0.01);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 1.6);
            };

            const tick = () => {
                if (audioRef.current) {
                    const time = audioRef.current.currentTime;
                    setCurrentTime(time);
                    if (!audioRef.current.paused && isSynthMode) {
                        sequenceRef.current.forEach(note => {
                            if (note.t > lastPlayedTimeRef.current && note.t <= time) {
                                playSynth(note.hz);
                            }
                        });
                    }
                    lastPlayedTimeRef.current = time;
                }
                requestAnimationFrame(tick);
            };

            useEffect(() => {
                requestAnimationFrame(tick);
            }, []);

            const handleFile = async (file) => {
                if (!file) return;
                setLoading(true); setError(null); setSequence([]);
                if (audioUrl) URL.revokeObjectURL(audioUrl);
                setAudioUrl(URL.createObjectURL(file));
                const fd = new FormData();
                fd.append('file', file);
                fd.append('threshold', sensitivity);
                fd.append('base_d', tunings[tuning].d);
                fd.append('base_g', tunings[tuning].g);
                fd.append('min_duration_ms', minDuration);
                fd.append('quality', quality);
                try {
                    const res = await fetch(`${getBackendBaseUrl()}/transcribe`, { method:'POST', body:fd });
                    if (!res.ok) throw new Error('Сервер қатесі');
                    const data = await res.json();
                    setSequence(data.sequence || []);
                    setAudioDuration(data.duration || 0);
                } catch (err) {
                    setError('Серверге қосылу мүмкін болмады');
                } finally { setLoading(false); }
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioChunksRef.current = [];
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) audioChunksRef.current.push(e.data);
                    };
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                        const file = new File([audioBlob], "recording.webm", { type: 'audio/webm' });
                        handleFile(file);
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start();
                    setIsRecording(true);
                    setRecordingTime(0);
                    timerRef.current = setInterval(() => setRecordingTime(prev => prev + 1), 1000);
                } catch (err) {
                    setError("Микрофонға рұқсат берілмеді.");
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && isRecording) {
                    mediaRecorderRef.current.stop();
                    setIsRecording(false);
                    clearInterval(timerRef.current);
                }
            };

            const downloadPDF = () => {
                if (!sequence.length) return;
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFont("courier", "normal");
                doc.setFontSize(11);
                let y = 20;
                doc.text("SANDYQ DOMBYRA - TABLATURE", 105, y, { align: "center" });
                y += 15;
                const CHUNK_TIME = 4.0;
                const maxTime = sequence[sequence.length - 1].t;
                for (let chunkStart = 0; chunkStart <= maxTime; chunkStart += CHUNK_TIME) {
                    let chunkEnd = chunkStart + CHUNK_TIME;
                    let notesInChunk = sequence.filter(n => n.t >= chunkStart && n.t < chunkEnd);
                    if (notesInChunk.length === 0) continue;
                    const DASHES = 65;
                    let lineG = Array(DASHES).fill('-');
                    let lineD = Array(DASHES).fill('-');
                    notesInChunk.forEach(note => {
                        let pos = Math.floor(((note.t - chunkStart) / CHUNK_TIME) * DASHES);
                        if (pos >= DASHES) pos = DASHES - 1;
                        let fretStr = note.f.toString();
                        let targetLine = note.s === 'G' ? lineG : lineD;
                        for (let i = 0; i < fretStr.length; i++) {
                            if (pos + i < DASHES) targetLine[pos + i] = fretStr[i];
                        }
                    });
                    if (y > 270) { doc.addPage(); y = 20; }
                    doc.text(`[${chunkStart.toFixed(1)}s - ${chunkEnd.toFixed(1)}s]`, 15, y); y += 6;
                    doc.text(`G |-${lineG.join('')}-|`, 15, y); y += 6;
                    doc.text(`D |-${lineD.join('')}-|`, 15, y); y += 12;
                }
                doc.save("dombyra_tabs.pdf");
            };

            const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

            return (
                <div className="main-wrapper">
                    <div className="sidebar-icons">
                        <div className={`sidebar-icon ${activeTab==='home'?'active':''}`} onClick={()=>{setActiveTab('home')}} title="Басты бет">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                        </div>
                        <div className={`sidebar-icon ${activeTab==='calendar'?'active':''}`} onClick={()=>{setActiveTab('calendar')}} title="Күнтізбе">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        </div>
                        <div className={`sidebar-icon ${activeTab==='star'?'active':''}`} onClick={()=>{setActiveTab('star')}} title="Таңдамалылар">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        </div>
                        <div className={`sidebar-icon ${activeTab==='settings'?'active':''}`} onClick={()=>{setActiveTab('settings')}} title="Параметрлер">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        </div>
                    </div>
                    
                    <button className="plus-btn" onClick={()=>fileRef.current.click()} title="Аудио файл жүктеу">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>

                    <div className="dashboard-header">
                        <div style={{display:'flex', alignItems:'center', gap:12, flex:1, minWidth:0}}>
                            <div className="nav-pills">
                                <button className={`nav-pill ${activeNav==='checkbox'?'active':''}`} onClick={()=>setActiveNav('checkbox')}>Тест</button>
                                <button className={`nav-pill ${activeNav==='monitoring'?'active':''}`} onClick={()=>setActiveNav('monitoring')}>Бақылау</button>
                                <button className={`nav-pill ${activeNav==='support'?'active':''}`} onClick={()=>setActiveNav('support')}>Көмек</button>
                                <button className="nav-pill" title="Іздеу"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
                            </div>
                        </div>
                        <div className="user-profile">
                            <img src="nurmaaq.png" alt="Sandyq Dombyra" style={{width:'36px', height:'36px', borderRadius:'12px', border:'1px solid #333', objectFit:'cover'}} />
                        </div>
                    </div>

                    <h2 className="section-title">Сынақ</h2>

                    <div className="controls-grid">
                        <div className="card">
                            <h3 className="card-title">Транскрипция</h3>
                            
                            <div style={{display:'flex', flexDirection:'column', gap:12, marginBottom:20}}>
                                <button className={`record-btn ${isRecording?'is-recording':''}`} 
                                    onClick={isRecording?stopRecording:startRecording}>
                                    {isRecording ? 'Тоқтату' : 'Аудио жазу'}
                                </button>
                                <button className="record-btn secondary" 
                                    onClick={()=>fileRef.current.click()}>
                                    {loading ? 'Өңдеу...' : 'Файл жүктеу'}
                                </button>
                                <input ref={fileRef} type="file" onChange={e=>handleFile(e.target.files[0])} style={{display:'none'}} />
                            </div>
                            <div style={{display:'flex', gap:10, flexWrap:'wrap', alignItems:'center', marginBottom:20}}>
                                <a href="https://www.youtube.com" target="_blank" rel="noreferrer" style={{display:'inline-flex', alignItems:'center', gap:8, padding:'10px 14px', background:'#ff0000', color:'#fff', borderRadius:16, textDecoration:'none', fontWeight:700, fontSize:12}}>
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M10 8.64L15.27 12 10 15.36V8.64M21.8 8s-.2-1.4-.8-2c-.8-.8-1.7-.8-2.1-.9C15.6 5 12 5 12 5h0s-3.6 0-6.9.1c-.4 0-1.3.1-2.1.9-.6.6-.8 2-.8 2S2 9.83 2 11.67v0C2 13.5 2.2 15 2.2 15s.2 1.4.8 2c.8.8 1.8.8 2.2.9 1.6.1 6.9.1 6.9.1s3.6 0 6.9-.1c.4 0 1.3-.1 2.1-.9.6-.6.8-2 .8-2s.2-1.5.2-3.33v0C22 9.83 21.8 8 21.8 8Z"/></svg>
                                    YouTube нұсқаулығы
                                </a>
                            </div>

                            {isRecording && <div className="recording-timer"><div className="recording-dot"></div> {formatTime(recordingTime)}</div>}

                            <div style={{display:'flex', gap:12, alignItems:'flex-start', marginBottom:20, flexWrap:'wrap'}}>
                                <button className={`synth-play-btn ${!isSynthMode?'inactive':''}`} 
                                    onClick={()=>setIsSynthMode(!isSynthMode)} 
                                    title="Синтезаторды қосу/өшіру">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                        <polygon points="5 3 19 12 5 21 5 3"/>
                                    </svg>
                                </button>
                                
                                <div className="slider-container">
                                    <div className="slider-header">
                                        <span className="slider-label">Сезімтілік</span>
                                        <span className="slider-value">{Math.round(sensitivity*100)}%</span>
                                    </div>
                                    <input type="range" min="0.01" max="0.3" step="0.01" 
                                        value={sensitivity} onChange={e=>setSensitivity(+e.target.value)} />
                                </div>
                            </div>

                            <div style={{display:'flex', flexDirection:'column', gap:8}}>
                                {Object.keys(tunings).map(k => (
                                    <button key={k} className={`tuning-btn ${tuning===k?'active':''}`} onClick={()=>setTuning(k)}>
                                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', width:'100%', gap:12}}>
                                            <span style={{flex:1, textAlign:'left'}}>{tunings[k].label}</span>
                                            {tuning===k && <div style={{width:6, height:6, background:'#bef38d', borderRadius:'50%', flexShrink:0}}></div>}
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="card">
                            <h3 className="card-title">Нота Кестесі</h3>
                            <div style={{maxHeight: 280, overflowY: 'auto', marginBottom: 16}}>
                                <table className="lesson-table">
                                    <thead>
                                        <tr><th>№</th><th>Уақыт</th><th>Струна</th><th>Лад</th></tr>
                                    </thead>
                                    <tbody>
                                        {sequence.length > 0 ? sequence.map((n, i) => (
                                            <tr key={i}>
                                                <td>{String(i+1).padStart(2,'0')}</td>
                                                <td>{n.t.toFixed(2)}s</td>
                                                <td>{n.s}</td>
                                                <td>{n.f}</td>
                                            </tr>
                                        )) : (
                                            <tr><td colSpan="4" style={{textAlign:'center', padding:'40px 0', opacity:0.3}}>Мәлімет жоқ</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                            <button onClick={downloadPDF} disabled={!sequence.length}
                                style={{
                                    background: sequence.length ? 'rgba(255,255,255,0.05)' : 'transparent', 
                                    border: '1px solid rgba(255,255,255,0.05)', 
                                    color: sequence.length ? '#fff' : '#333', 
                                    padding: '14px 16px', 
                                    minHeight: '44px',
                                    borderRadius: 16, 
                                    fontWeight: 800, 
                                    fontSize: 11,
                                    cursor: sequence.length ? 'pointer' : 'default', 
                                    width: '100%',
                                    transition: 'all 0.3s',
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center'
                                }}>
                                PDF-ГЕ ЖҮКТЕУ
                            </button>
                        </div>
                    </div>

                    <div className="card" style={{padding: '16px', marginBottom: 80}}>
                        <h3 className="card-title">Уақыт Сызығы</h3>
                        <div className="timeline-viewport" ref={timelineRef}>
                            <div className="timeline-content" style={{width: Math.max(600, audioDuration * PIXELS_PER_SECOND)}}>
                                <div className="playhead" style={{left: currentTime * PIXELS_PER_SECOND}}></div>
                                <div className="string-line" style={{top: G_STRING_Y}}></div>
                                <div className="string-line" style={{top: D_STRING_Y}}></div>
                                {sequence.map((n, i) => (
                                    <div key={i} className={`note-block ${n.s==='G'?'string-g':'string-d'} ${currentTime>=n.t && currentTime<=n.t+(n.dur/1000)?'active':''}`}
                                        style={{left: n.t*PIXELS_PER_SECOND, top: n.s==='G'?G_STRING_Y:D_STRING_Y, width: Math.max(40, (n.dur/1000)*PIXELS_PER_SECOND)}}
                                        onClick={()=>playSynth(n.hz)}
                                        onTouchStart={(e) => {e.preventDefault(); playSynth(n.hz);}}
                                        title={`${n.note} (${n.hz}Hz) @ ${n.t.toFixed(2)}s`}>
                                        {n.f}
                                        <div className="note-tooltip">{n.note} ({n.hz}Hz)</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        {audioUrl && <audio ref={audioRef} src={audioUrl} controls style={{marginTop: 16, width:'100%', minHeight:'44px'}} />}
                        {error && <div style={{color:'#EF4444', fontSize:12, marginTop:10, fontWeight:700}}>{error}</div>}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
