<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const getBackendBaseUrl = () => {
            // Permanent Hugging Face backend URL
            return 'https://nurmaaq-my-sandyq-dombyra.hf.space';
        };

        function App() {
            const [sequence, setSequence] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            
            // Settings
            const [sensitivity, setSensitivity] = useState(0.08);
            const [minDuration, setMinDuration] = useState(30);
            const [onsetSens, setOnsetSens] = useState(0.6);
            const [tuning, setTuning] = useState('DG');
            const [sourceMode, setSourceMode] = useState('smart');
            const [quality, setQuality] = useState('pro');
            const [chosenStem, setChosenStem] = useState(null);
            const [pitchMethod, setPitchMethod] = useState(null);
            
            const [audioDuration, setAudioDuration] = useState(0);
            const [totalNotes, setTotalNotes] = useState(0);
            const [audioUrl, setAudioUrl] = useState(null);
            const [currentTime, setCurrentTime] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [dragOver, setDragOver] = useState(false);
            
            // Recording State
            const [isRecording, setIsRecording] = useState(false);
            const [recordingTime, setRecordingTime] = useState(0);
            const mediaRecorderRef = useRef(null);
            const audioChunksRef = useRef([]);
            const timerRef = useRef(null);
            
            const audioRef = useRef(null);
            const fileRef = useRef(null);
            const timelineRef = useRef(null);
            const reqRef = useRef(null);
            const isDraggingRef = useRef(false);
            const startXRef = useRef(0);
            const scrollLeftRef = useRef(0);
            
            const [isSynthMode, setIsSynthMode] = useState(true);
            const lastPlayedTimeRef = useRef(-1);
            const sequenceRef = useRef([]);
            useEffect(() => { sequenceRef.current = sequence; }, [sequence]);

            const [playbackSpeed, setPlaybackSpeed] = useState(1.0);
            
            const changeSpeed = (speed) => {
                setPlaybackSpeed(speed);
                if (audioRef.current) {
                    audioRef.current.playbackRate = speed;
                }
            };

            useEffect(() => {
                if (audioRef.current) {
                    audioRef.current.playbackRate = playbackSpeed;
                }
            }, [audioUrl, playbackSpeed, isPlaying]);

            const audioCtxRef = useRef(null);
            
            const playNote = (noteObj, e) => {
                if (e) e.stopPropagation();
                playSynth(noteObj.hz);
            };

            const playSynth = (frequency) => {
                if (!audioCtxRef.current) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtxRef.current = new AudioContext();
                }
                const ctx = audioCtxRef.current;
                if (ctx.state === 'suspended') ctx.resume();

                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                const filter = ctx.createBiquadFilter();

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(frequency, ctx.currentTime);

                gainNode.gain.setValueAtTime(0, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(1, ctx.currentTime + 0.01);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(frequency * 5, ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(frequency, ctx.currentTime + 1.0);

                osc.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);

                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 1.6);
            };

            const PIXELS_PER_SECOND = 160;
            const G_STRING_Y = 75;  
            const D_STRING_Y = 155; 

            const tunings = {
                'DG': { d:146.83, g:196.00, label:'D – G (Ре бұрауы)' },
                'CG': { d:130.81, g:196.00, label:'C – G (До бұрауы)' },
                'AD': { d:110.00, g:146.83, label:'A – D (Ля бұрауы)' }
            };

            // PDF Download Function
            const downloadPDF = () => {
                if (!sequence || sequence.length === 0) return;
                
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFont("courier", "normal");
                doc.setFontSize(11);
                
                let y = 20;
                doc.text("SANDYQ DOMBYRA - TABLATURE", 105, y, { align: "center" });
                y += 15;
                
                const CHUNK_TIME = 4.0; // 4 seconds per line
                const maxTime = sequence[sequence.length - 1].t;
                
                for (let chunkStart = 0; chunkStart <= maxTime; chunkStart += CHUNK_TIME) {
                    let chunkEnd = chunkStart + CHUNK_TIME;
                    let notesInChunk = sequence.filter(n => n.t >= chunkStart && n.t < chunkEnd);
                    if (notesInChunk.length === 0) continue;
                    
                    const DASHES = 65; // Width of the line
                    let lineG = Array(DASHES).fill('-');
                    let lineD = Array(DASHES).fill('-');
                    
                    notesInChunk.forEach(note => {
                        let pos = Math.floor(((note.t - chunkStart) / CHUNK_TIME) * DASHES);
                        if (pos >= DASHES) pos = DASHES - 1;
                        
                        let fretStr = note.f.toString();
                        let targetLine = note.s === 'G' ? lineG : lineD;
                        
                        // Overwrite dashes with the fret number
                        for (let i = 0; i < fretStr.length; i++) {
                            if (pos + i < DASHES) {
                                targetLine[pos + i] = fretStr[i];
                            }
                        }
                    });
                    
                    if (y > 270) {
                        doc.addPage();
                        y = 20;
                    }
                    
                    const names = notesInChunk.map(n => {
                        return n.octave_shift && n.octave_shift !== 0
                            ? ` (${n.s}${n.f}, окт.${n.octave_shift > 0 ? '+' : ''}${n.octave_shift})`
                            : ` (${n.s}${n.f})`;
                    }).join('  ');
                    doc.text(`[${chunkStart.toFixed(1)}s - ${chunkEnd.toFixed(1)}s]`, 15, y);
                    y += 6;
                    doc.text(`G |-${lineG.join('')}-|`, 15, y);
                    y += 6;
                    doc.text(`D |-${lineD.join('')}-|`, 15, y);
                    y += 5;
                    doc.setFontSize(9);
                    doc.text(names.length > 95 ? names.slice(0, 92) + '...' : names, 15, y);
                    doc.setFontSize(11);
                    y += 12;
                }
                
                doc.save("dombyra_tabs.pdf");
            };

            const handleFile = async (file) => {
                if (!file) return;
                setLoading(true); setError(null); setSequence([]);
                if (audioUrl) URL.revokeObjectURL(audioUrl);
                setAudioUrl(URL.createObjectURL(file));
                const fd = new FormData();
                fd.append('file', file);
                fd.append('threshold', sensitivity);
                fd.append('base_d', tunings[tuning].d);
                fd.append('base_g', tunings[tuning].g);
                fd.append('min_duration_ms', minDuration);
                fd.append('onset_sensitivity', onsetSens);
                fd.append('source_mode', sourceMode);
                fd.append('quality', quality);
                try {
                    const backendBaseUrl = getBackendBaseUrl();
                    const res = await fetch(`${backendBaseUrl}/transcribe`, { method:'POST', body:fd });
                    if (!res.ok) throw new Error(`Сервер қатесі: ${res.status}`);
                    const data = await res.json();
                    if (data.error) throw new Error(data.error);
                    setSequence(data.sequence || []);
                    setAudioDuration(data.duration || 0);
                    setTotalNotes(data.total_notes || 0);
                    setChosenStem(data.chosen_stem || null);
                    setPitchMethod(data.pitch_method || null);

                        setError('Backend-ке қосылмады. Серверді іске қосыңыз: cd backend && uvicorn main:app --host 0.0.0.0 --port 8000');
                    } else {
                        setError(rawMessage || 'Жергілікті сервермен байланыс орнатылмады (127.0.0.1:8000)');
                    }
                } finally { setLoading(false); }
            };

            const startRecording = async () => {
                try {

                    audioChunksRef.current = [];
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) audioChunksRef.current.push(e.data);
                    };
                    
                    mediaRecorder.onstop = () => {
                        const mimeType = mediaRecorder.mimeType || 'audio/webm';
                        const extension = mimeType.includes('ogg') ? 'ogg' : (mimeType.includes('webm') ? 'webm' : 'wav');
                        const audioBlob = new Blob(audioChunksRef.current, { type: mimeType });
                        const file = new File([audioBlob], `recording.${extension}`, { type: mimeType });
                        handleFile(file);
                        stream.getTracks().forEach(track => track.stop());
                    };
                    
                    mediaRecorder.start();
                    setIsRecording(true);
                    setRecordingTime(0);
                    
                    timerRef.current = setInterval(() => {
                        setRecordingTime(prev => prev + 1);
                    }, 1000);
                    
                } catch (err) {
                    setError("Микрофонға рұқсат берілмеді немесе құрылғы табылмады.");
                }
            };

            const stopRecording = () => {

                    setCurrentTime(time);

                            }

                            }
                            sequenceRef.current.forEach(note => {
                                if (note.t > lastPlayedTimeRef.current && note.t <= time) {

                                }
                            });
                            lastPlayedTimeRef.current = time;
                        } else {
                            lastPlayedTimeRef.current = time;
                        }
                    } else {
                        lastPlayedTimeRef.current = time;
                    }
                }
                reqRef.current = requestAnimationFrame(tick);
            };

            useEffect(() => {
                reqRef.current = requestAnimationFrame(tick);

                    {/* ═══ CONTROLS ═══ */}

                                    <div className="playhead" style={{left: currentTime * PIXELS_PER_SECOND}}></div>

                                    {/* G String Line */}
                                    <div className="string-line" style={{top: G_STRING_Y}}></div>
                                    <div className="string-label" style={{top: G_STRING_Y}}>G</div>

                                    {/* D String Line */}
                                    <div className="string-line" style={{top: D_STRING_Y}}></div>
                                    <div className="string-label" style={{top: D_STRING_Y}}>D</div>

                                    {/* Notes Rendering */}
                                    {sequence.map((note, i) => {
                                        const leftPos = note.t * PIXELS_PER_SECOND;
                                        const width = Math.max(24, (note.dur / 1000) * PIXELS_PER_SECOND);
                                        const yPos = note.s === 'G' ? G_STRING_Y : D_STRING_Y;
                                        const isStringG = note.s === 'G';
                                        
                                        const isActive = currentTime >= note.t && currentTime <= note.t + (note.dur / 1000);

                                        return (
                                            <div 
                                                key={i}
                                                onClick={(e) => playNote(note, e)}
                                                className={`note-block ${isStringG ? 'string-g' : 'string-d'} ${isActive ? 'active' : ''}`}
                                                style={{
                                                    left: leftPos,
                                                    top: yPos,
                                                    width: width,
                                                    cursor: 'pointer'
                                                }}
                                            >
                                                <div className="note-block-inner">
                                                    <span className="note-fret-num">{note.f}</span>
                                                </div>
                                                <div className="note-tooltip">
                                                    Естілетін: <strong>{note.note}</strong> ({note.hz} Гц)
                                                    <br/>Перне: {note.s}-ішек, {note.f}-перне
                                                    {note.octave_shift !== 0 && note.octave_shift != null && (
                                                        <><br/>Ойнату: {note.played_note || note.note} (басқа октава/ішек)</>
                                                    )}
                                                    <br/>Ұзақтығы: {note.dur} мс
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="lesson-panel premium-container">
                                <h3>📋 Ноталар тізімі — досыңа түсіндіруге ыңғайлы</h3>
                                <p className="learn-hint">
                                    Егер нота домбырада жоқ болса, бағдарлама сол нотаны жоғары немесе төмен ішекте/октавада ойнайтын пернені көрсетеді. Сары белгі — басқа октавада ойналады.
                                </p>
                                <div className="lesson-table-wrap">
                                    <table className="lesson-table">
                                        <thead>
                                            <tr>
                                                <th>№</th>
                                                <th>Уақыт</th>
                                                <th>Ішек</th>
                                                <th>Перне</th>
                                                <th>Ескерту</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {sequence.map((note, i) => (
                                                <tr key={`row-${i}`}>
                                                    <td>{i + 1}</td>
                                                    <td>{note.t.toFixed(2)}s</td>
                                                    <td>{note.s}</td>
                                                    <td>{note.f}</td>
                                                    <td>
                                                        {note.octave_shift !== 0 && note.octave_shift != null ? (
                                                            <span className="octave-badge">
                                                                {note.played_note} ({note.s}{note.f})
                                                            </span>
                                                        ) : '—'}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
